<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Game Server Tester</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #f0a500; }
        .section { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #0f3460; }
        .section h2 { font-size: 1.1em; margin-bottom: 12px; color: #e94560; }
        label { display: block; font-size: 0.9em; margin-bottom: 4px; color: #ccc; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #0f3460; border: 1px solid #16213e; border-radius: 8px; color: #fff; font-size: 1em; }
        textarea { min-height: 80px; resize: vertical; font-family: monospace; }
        button { background: #e94560; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:active { background: #f06b7f; }
        .result { margin-top: 10px; padding: 10px; background: #0f3460; border-radius: 8px; font-family: monospace; font-size: 0.9em; white-space: pre-wrap; word-break: break-word; min-height: 40px; }
        .result.success { border-left: 4px solid #00c853; }
        .result.error { border-left: 4px solid #ff1744; }
        .note { font-size: 0.8em; color: #888; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <h1> Game Server Tester</h1>

    <div id="currentSession" style="text-align:center; margin-bottom:10px; opacity:0.8;">
        Session: <span id="sessionIdDisplay">—</span>
    </div>

    <!-- 1. Create Session -->
    <div class="section">
        <h2>1. Create Session</h2>
        <label>Game ID</label>
        <input id="createGameId" placeholder="tictactoe" value="tictactoe">
        <label>Player ID (owner)</label>
        <input id="createPlayerId" placeholder="mickey" value="mickey">
        <label>Game State (JSON or string)</label>
        <textarea id="createGameState" placeholder='{ "board": [".",".","."], "turn": 0 }'>{ "board": [".",".","."], "turn": 0 }</textarea>
        <button onclick="apiCreateSession()">Create Session</button>
        <div class="result" id="createResult"></div>
    </div>

    <!-- 2. Join Session -->
    <div class="section">
        <h2>2. Join Session</h2>
        <label>Game ID</label>
        <input id="joinGameId" placeholder="tictactoe" value="tictactoe">
        <label>Session ID</label>
        <input id="joinSessionId" placeholder="123">
        <label>Player ID</label>
        <input id="joinPlayerId" placeholder="donald" value="donald">
        <button onclick="apiJoinSession()">Join Session</button>
        <div class="result" id="joinResult"></div>
    </div>

    <!-- 3. Start Game -->
    <div class="section">
        <h2>3. Start Game</h2>
        <label>Session ID</label>
        <input id="startSessionId" placeholder="123">
        <label>Owner Player ID</label>
        <input id="startPlayerId" placeholder="mickey">
        <label>Player List (comma separated)</label>
        <input id="startPlayerList" placeholder="mickey,donald" value="mickey,donald">
        <label>Game State (JSON or string)</label>
        <textarea id="startGameState" placeholder='{ "board": [".",".","."], "turn": 0 }'>{ "board": [".",".","."], "turn": 0 }</textarea>
        <button onclick="apiStartGame()">Start Game</button>
        <div class="result" id="startResult"></div>
    </div>

    <!-- 4. Get Players -->
    <div class="section">
        <h2>4. Get Players</h2>
        <label>Session ID</label>
        <input id="playersSessionId" placeholder="123">
        <button onclick="apiGetPlayers()">Get Players</button>
        <div class="result" id="playersResult"></div>
    </div>

    <!-- 5. Update Game State -->
    <div class="section">
        <h2>5. Update Game State</h2>
        <label>Session ID</label>
        <input id="updateSessionId" placeholder="123">
        <label>Player ID</label>
        <input id="updatePlayerId" placeholder="mickey">
        <label>New Game State (JSON or string)</label>
        <textarea id="updateGameState" placeholder='{ "board": ["X",".","O"], "turn": 1 }'>{ "board": ["X",".","O"], "turn": 1 }</textarea>
        <button onclick="apiUpdateGameState()">Update Game State</button>
        <div class="result" id="updateResult"></div>
    </div>

    <!-- 6. Get Game State -->
    <div class="section">
        <h2>6. Get Game State</h2>
        <label>Session ID</label>
        <input id="stateSessionId" placeholder="123">
        <button onclick="apiGetGameState()">Get Game State</button>
        <div class="result" id="stateResult"></div>
    </div>

    <!-- 7. Get Current Player -->
    <div class="section">
        <h2>7. Get Current Player</h2>
        <label>Session ID</label>
        <input id="currentPlayerSessionId" placeholder="123">
        <button onclick="apiGetCurrentPlayer()">Get Current Player</button>
        <div class="result" id="currentPlayerResult"></div>
    </div>

    <!-- 8. Get Game State ID (NEW) -->
    <div class="section">
        <h2>8. Get Game State ID</h2>
        <label>Session ID</label>
        <input id="gameStateIDSessionId" placeholder="123">
        <button onclick="apiGetGameStateID()">Get Game State ID</button>
        <div class="result" id="gameStateIDResult"></div>
    </div>

    <!-- 9. End Session -->
    <div class="section">
        <h2>9. End Session</h2>
        <label>Session ID</label>
        <input id="endSessionId" placeholder="123">
        <label>Player ID (must be owner)</label>
        <input id="endPlayerId" placeholder="mickey">
        <button onclick="apiEndSession()">End Session</button>
        <div class="result" id="endResult"></div>
    </div>

    <div class="note"> Server: https://game-server-xi6m.onrender.com</div>

    <script>
        const BASE_URL = 'https://game-server-xi6m.onrender.com';

        function showResult(elementId, data, isError = false) {
            const el = document.getElementById(elementId);
            el.textContent = typeof data === 'object' ? JSON.stringify(data, null, 2) : data;
            el.className = 'result ' + (isError ? 'error' : 'success');
        }

        function setCurrentSession(sessionId) {
            document.getElementById('sessionIdDisplay').textContent = sessionId || '—';
            document.getElementById('joinSessionId').value = sessionId || '';
            document.getElementById('startSessionId').value = sessionId || '';
            document.getElementById('playersSessionId').value = sessionId || '';
            document.getElementById('updateSessionId').value = sessionId || '';
            document.getElementById('stateSessionId').value = sessionId || '';
            document.getElementById('currentPlayerSessionId').value = sessionId || '';
            document.getElementById('gameStateIDSessionId').value = sessionId || '';   // NEW
            document.getElementById('endSessionId').value = sessionId || '';
        }

        function parseGameStateString(text) {
            try { return JSON.parse(text); } catch { return text; }
        }

        async function apiCreateSession() {
            const gameId = document.getElementById('createGameId').value;
            const playerId = document.getElementById('createPlayerId').value;
            const stateRaw = document.getElementById('createGameState').value;
            const gameState = parseGameStateString(stateRaw);
            try {
                const res = await fetch(`${BASE_URL}/createSession`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gameID: gameId, playerID: playerId, gameState })
                });
                const data = await res.json();
                showResult('createResult', data, !res.ok);
                if (data.sessionID) {
                    setCurrentSession(data.sessionID);
                    document.getElementById('joinGameId').value = gameId;
                }
            } catch (err) {
                showResult('createResult', 'Network error: ' + err.message, true);
            }
        }

        async function apiJoinSession() {
            const gameId = document.getElementById('joinGameId').value;
            const sessionId = document.getElementById('joinSessionId').value;
            const playerId = document.getElementById('joinPlayerId').value;
            try {
                const res = await fetch(`${BASE_URL}/joinSession`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gameID: gameId, sessionID: sessionId, playerID: playerId })
                });
                const data = await res.json();
                showResult('joinResult', data, !res.ok);
                if (data === true) setCurrentSession(sessionId);
            } catch (err) {
                showResult('joinResult', 'Network error: ' + err.message, true);
            }
        }

        async function apiStartGame() {
            const sessionId = document.getElementById('startSessionId').value;
            const playerId = document.getElementById('startPlayerId').value;
            const playerListRaw = document.getElementById('startPlayerList').value;
            const playerList = playerListRaw.split(',').map(s => s.trim()).filter(Boolean);
            const stateRaw = document.getElementById('startGameState').value;
            const gameState = parseGameStateString(stateRaw);
            try {
                const res = await fetch(`${BASE_URL}/startGame`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionID: sessionId, playerID: playerId, playerList, gameState })
                });
                const data = await res.json();
                showResult('startResult', data, !res.ok);
            } catch (err) {
                showResult('startResult', 'Network error: ' + err.message, true);
            }
        }

        async function apiGetPlayers() {
            const sessionId = document.getElementById('playersSessionId').value;
            try {
                const res = await fetch(`${BASE_URL}/getPlayers?sessionID=${encodeURIComponent(sessionId)}`);
                const data = await res.json();
                showResult('playersResult', data, !res.ok);
            } catch (err) {
                showResult('playersResult', 'Network error: ' + err.message, true);
            }
        }

        async function apiUpdateGameState() {
            const sessionId = document.getElementById('updateSessionId').value;
            const playerId = document.getElementById('updatePlayerId').value;
            const stateRaw = document.getElementById('updateGameState').value;
            const gameState = parseGameStateString(stateRaw);
            try {
                const res = await fetch(`${BASE_URL}/updateGameState`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionID: sessionId, playerID: playerId, gameState })
                });
                const data = await res.json();
                showResult('updateResult', data, !res.ok);
            } catch (err) {
                showResult('updateResult', 'Network error: ' + err.message, true);
            }
        }

        async function apiGetGameState() {
            const sessionId = document.getElementById('stateSessionId').value;
            try {
                const res = await fetch(`${BASE_URL}/getGameState?sessionID=${encodeURIComponent(sessionId)}`);
                const data = await res.json();
                showResult('stateResult', data, !res.ok);
            } catch (err) {
                showResult('stateResult', 'Network error: ' + err.message, true);
            }
        }

        async function apiGetCurrentPlayer() {
            const sessionId = document.getElementById('currentPlayerSessionId').value;
            try {
                const res = await fetch(`${BASE_URL}/getCurrentPlayer?sessionID=${encodeURIComponent(sessionId)}`);
                const data = await res.json();
                showResult('currentPlayerResult', data, !res.ok);
            } catch (err) {
                showResult('currentPlayerResult', 'Network error: ' + err.message, true);
            }
        }

        async function apiGetGameStateID() {
            const sessionId = document.getElementById('gameStateIDSessionId').value;
            try {
                const res = await fetch(`${BASE_URL}/getGameStateID?sessionID=${encodeURIComponent(sessionId)}`);
                const data = await res.json();
                showResult('gameStateIDResult', data, !res.ok);
            } catch (err) {
                showResult('gameStateIDResult', 'Network error: ' + err.message, true);
            }
        }

        async function apiEndSession() {
            const sessionId = document.getElementById('endSessionId').value;
            const playerId = document.getElementById('endPlayerId').value;
            try {
                const res = await fetch(`${BASE_URL}/endSession`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionID: sessionId, playerID: playerId })
                });
                const data = await res.json();
                showResult('endResult', data, !res.ok);
                if (data === true) setCurrentSession('');
            } catch (err) {
                showResult('endResult', 'Network error: ' + err.message, true);
            }
        }
    </script>
</body>
</html>
