openapi: 3.0.3
info:
  title: Game Session Server API
  description: |
    Manage turn‑based multiplayer game sessions (e.g., Tic‑Tac‑Toe).  
    **All player IDs are case‑insensitive.**  
    Game state can be passed as a plain string or a JSON object (it will be stored as a string).
  version: 1.0.0
  contact:
    name: API Support
servers:
  - url: https://game-server-xi6m.onrender.com
    description: Production server
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Session management
  - name: Game play

paths:
  /createSession:
    post:
      tags: [Session management]
      summary: Create a new game session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionID:
                    type: string
                    pattern: '^\d{3}$'
                    example: '042'
        '400':
          $ref: '#/components/responses/BadRequest'

  /joinSession:
    post:
      tags: [Session management]
      summary: Join an existing game session
      description: |
        Returns `true` if the player was added.  
        Returns `false` if the player is already in the session, the game has already started, or the `gameID` doesn’t match.
      operationId: joinSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinSessionRequest'
      responses:
        '200':
          description: Result of the join attempt (true / false)
          content:
            application/json:
              schema:
                type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /startGame:
    post:
      tags: [Game play]
      summary: Start the game (only the session owner)
      description: |
        Replaces the player list, initializes the game state, sets the first player in the list as the current player, and locks the session (no more joins).  
        Returns `true` on success, `false` if the caller is not the owner.
      operationId: startGame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartGameRequest'
      responses:
        '200':
          description: Result (true / false)
          content:
            application/json:
              schema:
                type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /getPlayers:
    get:
      tags: [Session management]
      summary: Get the list of players in a session
      operationId: getPlayers
      parameters:
        - name: sessionID
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of players (case‑insensitive, stored in lowercase)
          content:
            application/json:
              schema:
                type: object
                properties:
                  players:
                    type: array
                    items:
                      type: string
                example:
                  players: ["mickey", "donald"]
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /updateGameState:
    post:
      tags: [Game play]
      summary: Update the game state (only the current player)
      description: |
        Must be the current player’s turn.  
        After the update, the turn automatically passes to the next player in the list.  
        Returns `true` if successful, `false` if not the current player’s turn or the game hasn’t started.
      operationId: updateGameState
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameStateRequest'
      responses:
        '200':
          description: Result (true / false)
          content:
            application/json:
              schema:
                type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /getGameState:
    get:
      tags: [Game play]
      summary: Get the current game state
      operationId: getGameState
      parameters:
        - name: sessionID
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current game state, or null if session doesn’t exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  gameState:
                    type: string
                    nullable: true
                    description: Game state as a string (may be a JSON string)
                example:
                  gameState: '{"board":[".",".","."],"turn":0}'
        '400':
          $ref: '#/components/responses/BadRequest'

  /endSession:
    post:
      tags: [Session management]
      summary: End a game session (only the owner)
      description: |
        Deletes all session data if the caller is the owner.  
        Returns `true` on success, `false` otherwise.
      operationId: endSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndSessionRequest'
      responses:
        '200':
          description: Result (true / false)
          content:
            application/json:
              schema:
                type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    CreateSessionRequest:
      type: object
      required: [gameID, playerID, gameState]
      properties:
        gameID:
          type: string
          example: tictactoe
        playerID:
          type: string
          description: Case‑insensitive identifier of the session owner
          example: Mickey
        gameState:
          type: string
          description: Initial game state (can be a JSON string or plain text)
          example: '{"board":[".",".","."],"turn":0}'

    JoinSessionRequest:
      type: object
      required: [gameID, sessionID, playerID]
      properties:
        gameID:
          type: string
          example: tictactoe
        sessionID:
          type: string
          pattern: '^\d{3}$'
          example: '042'
        playerID:
          type: string
          description: Case‑insensitive player identifier
          example: donald

    StartGameRequest:
      type: object
      required: [sessionID, playerID, playerList, gameState]
      properties:
        sessionID:
          type: string
          pattern: '^\d{3}$'
        playerID:
          type: string
          description: Must be the session owner (case‑insensitive)
        playerList:
          type: array
          items:
            type: string
          description: Ordered list of players (first player gets the first turn)
          example: ["mickey", "donald"]
        gameState:
          type: string
          description: Initial game state
          example: '{"board":[".",".","."],"turn":0}'

    UpdateGameStateRequest:
      type: object
      required: [sessionID, playerID, gameState]
      properties:
        sessionID:
          type: string
          pattern: '^\d{3}$'
        playerID:
          type: string
          description: Must be the current player (case‑insensitive)
        gameState:
          type: string
          description: New game state
          example: '{"board":["X",".","."],"turn":1}'

    EndSessionRequest:
      type: object
      required: [sessionID, playerID]
      properties:
        sessionID:
          type: string
          pattern: '^\d{3}$'
        playerID:
          type: string
          description: Must be the session owner

  responses:
    BadRequest:
      description: Missing or invalid parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    NotFound:
      description: Session not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string