/getCurrentPlayer:
  get:
    tags: [Game play]
    summary: Get the current player whose turn it is
    description: |
      Returns the current player if the game has started.  
      Returns `null` if the game hasn't started yet or the session doesn't exist.
    operationId: getCurrentPlayer
    parameters:
      - name: sessionID
        in: query
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Current player or null
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPlayer:
                  type: string
                  nullable: true
              example:
                currentPlayer: "mickey"
      '400':
        $ref: '#/components/responses/BadRequest'